# Redirect bare HTTP → HTTPS
server {
    listen 80;
    server_name sajiloremit.com www.sajiloremit.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sajiloremit.com www.sajiloremit.com;

    # ── SSL ─────────────────────────────────────────────────────────────────
    # Replace with your actual certificate paths (e.g. from certbot/Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/sajiloremit.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sajiloremit.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Static frontend ─────────────────────────────────────────────────────
    root /var/www/sajiloRemit/frontend/dist;
    index index.html;

    # Serve /assets/* directly — never fall through to index.html.
    # A real 404 for a missing asset file is better than serving HTML
    # (which causes the "Expected a JavaScript module" MIME-type error).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Gallery / upload files served directly from disk (bypasses Node.js)
    location /uploads/ {
        alias /var/www/sajiloRemit-uploads/;
        expires 30d;
        add_header Cache-Control "public";
        add_header Cross-Origin-Resource-Policy "cross-origin";
        try_files $uri =404;
    }

    # API — proxy to Node.js backend
    location /api/ {
        proxy_pass         http://127.0.0.1:5004;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — all other paths return index.html so React Router works
    location / {
        try_files $uri $uri/ /index.html;
    }
}
